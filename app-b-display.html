<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Answer Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --text-dim: #4a4a6a; --text-mid: #8888aa; --text: #e8e8f0;
    --accent: #c8f135; --accent-dim: #8aaa20;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace; overflow: hidden;
  }

  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; gap: 0;
  }

  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.25; pointer-events: none;
  }

  .corner { position: absolute; width: 32px; height: 32px; border-color: var(--text-dim); border-style: solid; opacity: 0.4; }
  .corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
  .corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
  .corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

  /* Config panel */
  .config-panel { position: absolute; top: 36px; left: 36px; z-index: 10; display: flex; flex-direction: column; gap: 8px; }
  .config-panel input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 4px; width: 220px; outline: none; }
  .config-panel input:focus { border-color: var(--accent-dim); }
  .config-panel input::placeholder { color: var(--text-dim); }
  .config-panel button { background: var(--surface); border: 1px solid var(--accent-dim); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: background 0.2s; }
  .config-panel button:hover { background: #1a2a00; }
  .config-label { font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }

  /* History */
  .history { position: absolute; top: 36px; right: 36px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 1; }
  .history-label { font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }
  .history-item { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text-dim); line-height: 1; }

  /* Main display area */
  .display-area {
    display: flex; flex-direction: column; align-items: center;
    gap: 32px; z-index: 1; width: 100%;
    padding: 0 max(48px, 12vw);
  }

  /* Answer ring */
  .answer-ring { position: relative; width: min(40vw, 40vh, 280px); height: min(40vw, 40vh, 280px); flex-shrink: 0; }
  .ring-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .ring-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-progress { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 0 1000; transition: stroke-dasharray 0.6s cubic-bezier(0.4,0,0.2,1); transform-origin: center; transform: rotate(-90deg); }
  .answer-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: min(22vw, 22vh, 160px); color: var(--accent); line-height: 1; user-select: none; }
  .answer-number.waiting { color: var(--text-dim); font-size: min(8vw, 8vh, 56px); letter-spacing: 0.1em; }
  .answer-number.flash { animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0%{transform:scale(0.7);opacity:0.3} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }

  .flash-overlay { position: absolute; inset: 0; background: var(--accent); opacity: 0; pointer-events: none; border-radius: 50%; }
  .flash-overlay.go { animation: flashout 0.5s ease-out forwards; }
  @keyframes flashout { 0%{opacity:0.2} 100%{opacity:0} }

  /* Question text card */
  .question-card {
    width: 100%; max-width: 640px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 8px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .question-card.visible { opacity: 1; transform: translateY(0); }
  .question-card-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
  .question-text {
    font-family: 'DM Sans', sans-serif; font-size: clamp(14px, 2vw, 20px);
    color: var(--text); line-height: 1.55; font-weight: 400;
  }
  .question-text.empty { color: var(--text-dim); font-style: italic; font-size: 14px; }

  /* Status bar */
  .status-bar { position: absolute; bottom: 36px; display: flex; align-items: center; gap: 10px; font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); z-index: 1; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .dot.live { background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="config-panel">
  <div class="config-label">JSONBin config</div>
  <input id="bin-id" placeholder="Bin ID (from App A setup)" />
  <input id="api-key" placeholder="Master key (optional, for private)" />
  <button onclick="saveConfig()">Connect</button>
</div>

<div class="history" id="history-panel" style="display:none">
  <div class="history-label">Recent</div>
</div>

<div class="display-area">
  <div class="answer-ring">
    <svg class="ring-svg" viewBox="0 0 200 200">
      <circle class="ring-track" cx="100" cy="100" r="90"/>
      <circle class="ring-progress" id="ring" cx="100" cy="100" r="90"/>
    </svg>
    <div class="flash-overlay" id="flash-overlay"></div>
    <div class="answer-number waiting" id="answer-display">--</div>
  </div>

  <div class="question-card" id="question-card">
    <div class="question-card-label">Question</div>
    <div class="question-text empty" id="question-text">Waiting for first question...</div>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="status-dot"></div>
  <span id="status-text">Enter bin ID to connect</span>
</div>

<script>
  const POLL_MS = 1500;
  const CIRCUMFERENCE = 2 * Math.PI * 90;

  let binId = localStorage.getItem('binId') || '';
  let apiKey = localStorage.getItem('apiKey') || '';
  let lastAnswer = null;
  let lastQuestion = null;
  let pollTimer = null;
  let history = [];

  document.getElementById('bin-id').value = binId;
  document.getElementById('api-key').value = apiKey;

  function saveConfig() {
    binId  = document.getElementById('bin-id').value.trim();
    apiKey = document.getElementById('api-key').value.trim();
    localStorage.setItem('binId', binId);
    localStorage.setItem('apiKey', apiKey);
    startPolling();
  }

  function setStatus(text, live) {
    document.getElementById('status-text').textContent = text;
    document.getElementById('status-dot').className = 'dot' + (live ? ' live' : '');
  }

  function showAnswer(num, questionText) {
    const el      = document.getElementById('answer-display');
    const overlay = document.getElementById('flash-overlay');
    const ring    = document.getElementById('ring');
    const qcard   = document.getElementById('question-card');
    const qtxt    = document.getElementById('question-text');

    // Answer number
    el.className = 'answer-number';
    el.textContent = num;
    overlay.className = 'flash-overlay go';
    setTimeout(() => overlay.className = 'flash-overlay', 600);
    void el.offsetWidth;
    el.classList.add('flash');

    // Ring fill (proportional: answer 1 of 4 = 25%, answer 4 of 4 = 100%)
    const pct = num / 4;
    ring.style.strokeDasharray = `${pct * CIRCUMFERENCE} ${CIRCUMFERENCE}`;

    // Question card
    if (questionText && questionText.trim()) {
      qtxt.textContent = questionText.trim();
      qtxt.className = 'question-text';
    } else {
      qtxt.textContent = 'Question text not available';
      qtxt.className = 'question-text empty';
    }
    // Animate card in (reset then re-trigger)
    qcard.classList.remove('visible');
    void qcard.offsetWidth;
    qcard.classList.add('visible');

    // History
    history.unshift(num);
    if (history.length > 4) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const panel = document.getElementById('history-panel');
    if (history.length < 2) { panel.style.display = 'none'; return; }
    panel.style.display = 'flex';
    panel.querySelectorAll('.history-item').forEach(i => i.remove());
    history.slice(1).forEach(n => {
      const d = document.createElement('div');
      d.className = 'history-item';
      d.textContent = n;
      panel.appendChild(d);
    });
  }

  async function poll() {
    if (!binId) return;
    const headers = {};
    if (apiKey) headers['X-Master-Key'] = apiKey;

    try {
      const r = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, { headers });
      if (!r.ok) { setStatus('Error ' + r.status, false); return; }
      const data = await r.json();
      const answer   = data?.record?.answer;
      const question = data?.record?.question ?? '';
      const ts       = data?.record?.ts ?? 0;

      setStatus('Polling · ' + new Date().toLocaleTimeString(), true);

      // Trigger on new answer OR same answer with new timestamp (re-sent same question)
      if (answer !== undefined && (answer !== lastAnswer || question !== lastQuestion)) {
        lastAnswer   = answer;
        lastQuestion = question;
        showAnswer(answer, question);
      }
    } catch(e) {
      setStatus('Network error', false);
    }
  }

  function startPolling() {
    if (!binId) { setStatus('Enter bin ID to connect', false); return; }
    setStatus('Connecting...', false);
    if (pollTimer) clearInterval(pollTimer);
    poll();
    pollTimer = setInterval(poll, POLL_MS);
  }

  if (binId) startPolling();
</script>
</body>
</html>
