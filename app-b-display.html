<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Answer Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --text-dim: #4a4a6a; --text-mid: #8888aa; --text: #e8e8f0;
    --accent: #c8f135; --accent-dim: #8aaa20; --danger: #f13535;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; overflow: hidden;
  }

  body {
    display: flex; flex-direction: column;
    position: relative;
  }

  /* Subtle grid */
  body::before {
    content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.15; pointer-events: none;
  }

  /* ── Connection status (top right) ── */
  .conn-widget {
    position: absolute; top: 24px; right: 28px; z-index: 10;
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .conn-row  { display: flex; align-items: center; gap: 7px; }
  .conn-dot  { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
  .conn-dot.live       { background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  .conn-dot.error      { background: var(--danger); }
  .conn-dot.connecting { background: var(--text-mid); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .conn-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
  .lu-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); text-align: right; }
  .lu-ago  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); opacity: 0.6; text-align: right; }

  /* ── Layout: question top, answer bottom ── */
  .question-section {
    flex: 0 0 auto;
    padding: 52px 48px 28px;
    border-bottom: 1px solid var(--border);
    position: relative; z-index: 1;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 12px;
  }

  .question-text {
    font-size: clamp(16px, 2.2vw, 26px);
    color: var(--text); line-height: 1.55; font-weight: 400;
  }
  .question-text.waiting { color: var(--text-dim); font-style: italic; }

  .answer-section {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 32px 48px 48px;
    position: relative; z-index: 1;
  }

  .answer-type-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 20px;
    opacity: 0; transition: opacity 0.3s;
  }
  .answer-type-label.visible { opacity: 1; }

  /* ── Big answer (single_mc, multi_select) ── */
  .big-answer {
    display: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 22vw, 220px);
    color: var(--accent);
    line-height: 0.9;
    letter-spacing: 0.04em;
    animation: answerIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes answerIn {
    from { opacity: 0; transform: scale(0.75); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── List answer (ordering, matching) ── */
  .list-answer {
    display: none;
    flex-direction: column;
    gap: 0;
  }

  .list-row {
    display: flex; align-items: baseline; gap: 16px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    animation: rowIn 0.3s ease forwards;
    opacity: 0;
  }
  .list-row:first-child { border-top: 1px solid var(--border); }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .list-key {
    font-family: 'DM Mono', monospace;
    font-size: clamp(14px, 1.8vw, 20px);
    color: var(--accent);
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 32px;
  }

  .list-sep {
    font-family: 'DM Mono', monospace;
    font-size: clamp(13px, 1.6vw, 18px);
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .list-val {
    font-size: clamp(14px, 1.8vw, 20px);
    color: var(--text);
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- Connection status -->
<div class="conn-widget">
  <div class="conn-row">
    <div class="conn-dot connecting" id="conn-dot"></div>
    <div class="conn-label"         id="conn-label">Connecting</div>
  </div>
  <div class="lu-time" id="lu-time" style="display:none"></div>
  <div class="lu-ago"  id="lu-ago"  style="display:none"></div>
</div>

<!-- Question -->
<div class="question-section">
  <div class="section-label">Question</div>
  <div class="question-text waiting" id="question-text">Waiting for first question…</div>
</div>

<!-- Answer -->
<div class="answer-section">
  <div class="answer-type-label" id="answer-type-label">Answer</div>

  <!-- Single MC / Multi-select: big letter(s) -->
  <div class="big-answer" id="big-answer"></div>

  <!-- Ordering / Matching: list -->
  <div class="list-answer" id="list-answer"></div>
</div>

<script>
  const FIREBASE_URL = 'https://test-uh-306c6-default-rtdb.firebaseio.com/quiz.json';

  const elConnDot      = document.getElementById('conn-dot');
  const elConnLabel    = document.getElementById('conn-label');
  const elLuTime       = document.getElementById('lu-time');
  const elLuAgo        = document.getElementById('lu-ago');
  const elQuestionText = document.getElementById('question-text');
  const elTypeLabel    = document.getElementById('answer-type-label');
  const elBigAnswer    = document.getElementById('big-answer');
  const elListAnswer   = document.getElementById('list-answer');

  const TYPE_LABELS = {
    single_mc:    'Multiple Choice',
    multi_select: 'Multi-Select',
    ordering:     'Ordering',
    matching:     'Matching'
  };

  let lastTs = null, lastUpdate = null, agoTimer = null, evtSource = null;

  // ── Firebase listener ─────────────────────────────────────────────────────
  function connect() {
    if (evtSource) evtSource.close();
    setConn('connecting', 'Connecting');
    evtSource = new EventSource(FIREBASE_URL);

    evtSource.onopen = () => setConn('live', 'Live');

    evtSource.addEventListener('put', e => {
      setConn('live', 'Live');
      try {
        const record = JSON.parse(e.data).data;
        if (!record || record.answer == null) return;
        if (record.ts === lastTs) return;

        lastTs = record.ts;
        lastUpdate = Date.now();

        elLuTime.style.display = 'block';
        elLuAgo.style.display  = 'block';
        elLuTime.textContent   = new Date(lastUpdate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        updateAgo();

        showAnswer(record.type || 'single_mc', record.display || '', record.question || '');
      } catch(err) { console.warn('Parse error:', err); }
    });

    evtSource.onerror = () => {
      setConn('error', 'Reconnecting…');
      evtSource.close();
      setTimeout(connect, 5000);
    };
  }

  // ── Display ───────────────────────────────────────────────────────────────
  function showAnswer(type, display, questionText) {
    // Question
    if (questionText && questionText.trim()) {
      elQuestionText.textContent = questionText.trim();
      elQuestionText.className   = 'question-text';
    } else {
      elQuestionText.textContent = 'Question text not available';
      elQuestionText.className   = 'question-text waiting';
    }

    // Type label
    elTypeLabel.textContent = TYPE_LABELS[type] || type;
    elTypeLabel.classList.add('visible');

    if (type === 'single_mc' || type === 'multi_select') {
      // Big answer
      elListAnswer.style.display = 'none';
      elBigAnswer.style.display  = 'block';
      // Re-trigger animation
      elBigAnswer.style.animation = 'none';
      void elBigAnswer.offsetWidth;
      elBigAnswer.style.animation = '';
      elBigAnswer.textContent = display;
    } else {
      // List answer
      elBigAnswer.style.display  = 'none';
      elListAnswer.style.display = 'flex';
      elListAnswer.innerHTML = '';

      const lines = display.split('\n').filter(l => l.trim());
      lines.forEach((line, i) => {
        const dashIdx = line.indexOf(' - ');
        let key, val;
        if (dashIdx !== -1) {
          key = line.slice(0, dashIdx).trim();
          val = line.slice(dashIdx + 3).trim();
        } else {
          key = line;
          val = '';
        }

        const row = document.createElement('div');
        row.className = 'list-row';
        row.style.animationDelay = (i * 60) + 'ms';

        const elKey = document.createElement('div');
        elKey.className   = 'list-key';
        elKey.textContent = key;

        const elSep = document.createElement('div');
        elSep.className   = 'list-sep';
        elSep.textContent = '—';

        const elVal = document.createElement('div');
        elVal.className   = 'list-val';
        elVal.textContent = val;

        row.appendChild(elKey);
        if (val) { row.appendChild(elSep); row.appendChild(elVal); }
        elListAnswer.appendChild(row);
      });
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function startAgoUpdater() {
    clearInterval(agoTimer);
    agoTimer = setInterval(updateAgo, 1000);
  }

  function updateAgo() {
    if (!lastUpdate) return;
    const secs = Math.round((Date.now() - lastUpdate) / 1000);
    if (secs < 5)        elLuAgo.textContent = 'just now';
    else if (secs < 60)  elLuAgo.textContent = secs + 's ago';
    else                 elLuAgo.textContent = Math.floor(secs / 60) + 'm ' + (secs % 60) + 's ago';
  }

  function setConn(state, label) {
    elConnDot.className    = 'conn-dot ' + state;
    elConnLabel.textContent = label;
  }

  connect();
  startAgoUpdater();
</script>
</body>
</html>
