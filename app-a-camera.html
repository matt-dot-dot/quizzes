<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Question Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3a;
    --text-dim: #4a4a6a; --text-mid: #8888aa; --text: #e8e8f0;
    --accent: #c8f135; --accent-dim: #8aaa20; --danger: #f13535; --warn: #f5a623;
    --device-w: 430px; --device-h: 932px; --half-h: 466px;
  }

  html { height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }

  body {
    width: var(--device-w); height: var(--device-h);
    max-width: 100vw; max-height: 100vh;
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden; display: flex; flex-direction: column; position: relative;
  }

  #setup-screen {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px; background: var(--bg);
  }
  .setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: var(--accent); letter-spacing: 0.05em; }
  .setup-sub   { font-size: 11px; letter-spacing: 0.14em; color: var(--text-dim); text-transform: uppercase; text-align: center; line-height: 1.8; max-width: 300px; }
  .field-group { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 340px; }
  .field-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }

  input[type=text], input[type=password] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 14px;
    border-radius: 6px; width: 100%; outline: none; transition: border-color 0.2s;
  }
  input[type=text]:focus, input[type=password]:focus { border-color: var(--accent-dim); }
  input::placeholder { color: var(--text-dim); }

  .btn-primary {
    background: var(--accent); color: #0a0a0f; border: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.08em;
    padding: 11px 32px; border-radius: 6px; cursor: pointer;
    width: 100%; max-width: 340px; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .divider { width: 100%; max-width: 340px; border: none; border-top: 1px solid var(--border); }
  .helper  { font-size: 11px; color: var(--text-dim); line-height: 1.7; max-width: 340px; text-align: center; }

  #camera-screen { display: none; flex-direction: column; width: 100%; height: 100%; }

  .video-wrap {
    width: 100%; height: var(--half-h); flex-shrink: 0;
    position: relative; overflow: hidden; background: #000; touch-action: none;
  }
  video { width: 100%; height: 100%; object-fit: cover; transform-origin: center center; will-change: transform; }

  .countdown-wrap { position: absolute; top: 14px; left: 14px; width: 58px; height: 58px; pointer-events: none; z-index: 2; }
  .cd-svg   { width: 100%; height: 100%; transform: rotate(-90deg); }
  .cd-track { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 3.5; }
  .cd-ring  { fill: none; stroke: var(--accent); stroke-width: 3.5; stroke-linecap: round; stroke-dasharray: 0 151; transition: stroke-dasharray 1s linear, stroke 0.3s; }
  .cd-ring.urgent { stroke: var(--warn); }
  .cd-num   { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 19px; color: var(--text); line-height: 1; }

  .zoom-badge {
    position: absolute; top: 14px; right: 14px; z-index: 2;
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.15);
    color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 4px 10px; border-radius: 4px; letter-spacing: 0.08em;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .zoom-badge.show { opacity: 1; }

  .finder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 1; }
  .finder-box {
    width: 78vw; max-width: 310px; height: 170px;
    border: 2px solid rgba(200,241,53,0.35); border-radius: 8px;
    position: relative; transition: border-color 0.3s;
  }
  .finder-box.scanning { border-color: rgba(200,241,53,0.9); }
  .finder-box::before, .finder-box::after { content: ''; position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; }
  .finder-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .finder-box::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: var(--accent); opacity: 0; top: 0; }
  .scan-line.scanning { opacity: 0.8; animation: scandown 1.2s ease-in-out infinite; }
  @keyframes scandown { 0%{top:0%;opacity:.8} 90%{top:100%;opacity:.8} 100%{top:100%;opacity:0} }

  .pinch-hint {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 0.12em; color: rgba(255,255,255,0.3);
    text-transform: uppercase; white-space: nowrap; pointer-events: none; transition: opacity 1s; z-index: 2;
  }
  .pinch-hint.hidden { opacity: 0; }

  canvas { display: none; }

  .controls {
    width: 100%; height: var(--half-h); flex-shrink: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 16px 18px 20px; gap: 12px; overflow: hidden;
  }

  .status-row { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.3s; }
  .status-dot.ready { background: var(--accent); animation: pulse 2.5s ease-in-out infinite; }
  .status-dot.busy  { background: var(--warn); }
  .status-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .status-text { font-size: 12px; color: var(--text-mid); flex: 1; line-height: 1.4; }

  .result-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  }
  .result-top { display: flex; align-items: flex-start; gap: 12px; }
  .result-answer { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--accent); line-height: 1; min-width: 36px; flex-shrink: 0; }
  .result-right { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .result-type     { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
  .result-question { font-size: 12px; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sent-badge { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent-dim); padding: 3px 8px; border-radius: 3px; align-self: flex-start; opacity: 0; transition: opacity 0.3s; }
  .sent-badge.show { opacity: 1; }

  .section-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }

  .btn-row { display: flex; gap: 7px; flex-shrink: 0; }
  .ivl-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid);
    font-family: 'DM Mono', monospace; font-size: 13px; padding: 8px 0;
    border-radius: 6px; cursor: pointer; transition: all 0.15s; flex: 1; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .ivl-btn.active { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }

  .action-row { display: flex; gap: 10px; align-items: center; flex-shrink: 0; margin-top: auto; }
  .pause-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid);
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 0 16px; height: 52px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s; flex: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .pause-btn.paused { color: var(--accent); border-color: var(--accent-dim); }

  .shutter {
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--accent); border: 4px solid var(--surface); outline: 2px solid var(--accent-dim);
    cursor: pointer; flex-shrink: 0; transition: transform 0.1s, opacity 0.2s; position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .shutter:active   { transform: scale(0.91); }
  .shutter:disabled { opacity: 0.3; cursor: default; }
  .shutter.busy::after {
    content: ''; position: absolute; inset: 5px; border-radius: 50%;
    border: 3px solid rgba(0,0,0,0.2); border-top-color: rgba(0,0,0,0.75);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: absolute; bottom: 12px; left: 14px; right: 14px;
    background: var(--danger); color: #fff; font-size: 12px;
    padding: 10px 14px; border-radius: 6px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; z-index: 30;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-title">Question Scanner</div>
  <div class="setup-sub">Auto-detects MC · Multi-select · Ordering · Matching</div>
  <div class="field-group">
    <div class="field-label">Anthropic API key</div>
    <input id="claude-key" type="password" placeholder="sk-ant-..." />
  </div>
  <button class="btn-primary" onclick="startApp()">Start Camera</button>
  <hr class="divider">
  <div class="helper">If camera doesn't start, open Safari Settings<br>and re-enable camera for this site.</div>
</div>

<div id="camera-screen">
  <div class="video-wrap" id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="countdown-wrap">
      <svg class="cd-svg" viewBox="0 0 58 58">
        <circle class="cd-track" cx="29" cy="29" r="24"/>
        <circle class="cd-ring" id="cd-ring" cx="29" cy="29" r="24"/>
      </svg>
      <div class="cd-num" id="cd-num">—</div>
    </div>
    <div class="zoom-badge" id="zoom-badge">1.0×</div>
    <div class="finder">
      <div class="finder-box" id="finder-box">
        <div class="scan-line" id="scan-line"></div>
      </div>
    </div>
    <div class="pinch-hint" id="pinch-hint">Pinch to zoom</div>
  </div>

  <div class="controls">
    <div class="status-row">
      <div class="status-dot ready" id="status-dot"></div>
      <div class="status-text" id="status-text">Ready — tap shutter or wait for timer</div>
    </div>

    <div class="result-card">
      <div class="result-top">
        <div class="result-answer"   id="result-answer">—</div>
        <div class="result-right">
          <div class="result-type"     id="result-type">Waiting</div>
          <div class="result-question" id="result-question">Waiting for first capture…</div>
        </div>
      </div>
      <div class="sent-badge" id="sent-badge">Sent to display</div>
    </div>

    <div class="section-label">Capture interval</div>
    <div class="btn-row">
      <button class="ivl-btn"        onclick="setIntervalSecs(30,this)">30s</button>
      <button class="ivl-btn"        onclick="setIntervalSecs(60,this)">60s</button>
      <button class="ivl-btn active" onclick="setIntervalSecs(90,this)">90s</button>
      <button class="ivl-btn"        onclick="setIntervalSecs(120,this)">2 min</button>
    </div>

    <div class="action-row">
      <button class="pause-btn" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="shutter"   id="shutter"   onclick="manualCapture()"></button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const FIREBASE_URL = 'https://test-uh-306c6-default-rtdb.firebaseio.com/quiz.json';

let claudeKey = '', intervalSecs = 90, paused = false, busy = false;
let countdownTimer = null, secondsLeft = 90;
const CIRC = 2 * Math.PI * 24;

let videoTrack = null, useNativeZoom = false;
let zoomLevel = 1.0, minZoom = 1.0, maxZoom = 5.0;
let pinchStart = null, pinchZoomStart = 1.0;
let zoomBadgeTimer = null, hintHidden = false;

let elVideo, elCanvas, elCdRing, elCdNum, elFinderBox, elScanLine;
let elStatusDot, elStatusText, elResultAnswer, elResultType, elResultQuestion;
let elSentBadge, elShutter, elZoomBadge, elToast;

function cacheDOMRefs() {
  elVideo = document.getElementById('video');
  elCanvas = document.getElementById('canvas');
  elCdRing = document.getElementById('cd-ring');
  elCdNum = document.getElementById('cd-num');
  elFinderBox = document.getElementById('finder-box');
  elScanLine = document.getElementById('scan-line');
  elStatusDot = document.getElementById('status-dot');
  elStatusText = document.getElementById('status-text');
  elResultAnswer = document.getElementById('result-answer');
  elResultType = document.getElementById('result-type');
  elResultQuestion = document.getElementById('result-question');
  elSentBadge = document.getElementById('sent-badge');
  elShutter = document.getElementById('shutter');
  elZoomBadge = document.getElementById('zoom-badge');
  elToast = document.getElementById('toast');
}

async function startApp() {
  claudeKey = document.getElementById('claude-key').value.trim();
  if (!claudeKey) { alert('Please enter your Anthropic API key'); return; }
  localStorage.setItem('claudeKey', claudeKey);

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('camera-screen').style.display = 'flex';
  cacheDOMRefs();
  setupPinchZoom();

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showCameraError('Camera API unavailable. Make sure the page is loaded over HTTPS in Safari.');
    return;
  }

  const attempts = [
    { video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false },
    { video: { facingMode: 'environment' }, audio: false },
    { video: true, audio: false }
  ];

  let stream = null, lastErr = null;
  for (const c of attempts) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch (e) { lastErr = e; }
  }

  if (!stream) {
    showCameraError('Camera access denied.\n\niOS: Settings → Safari → Camera → Allow\nError: ' + (lastErr?.message || 'unknown'));
    return;
  }

  elVideo.srcObject = stream;
  elVideo.onloadedmetadata = () => {
    const track = stream.getVideoTracks()[0];
    if (track) {
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.zoom) { minZoom = caps.zoom.min; maxZoom = caps.zoom.max; useNativeZoom = true; videoTrack = track; }
    }
    startCountdown();
  };
}

function showCameraError(msg) {
  document.getElementById('camera-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  alert(msg);
}

function setupPinchZoom() {
  const wrap = document.getElementById('video-wrap');
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { pinchStart = pinchDist(e.touches); pinchZoomStart = zoomLevel; e.preventDefault(); }
  }, { passive: false });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2 && pinchStart) { applyZoom(pinchZoomStart * (pinchDist(e.touches) / pinchStart)); e.preventDefault(); }
  }, { passive: false });
  wrap.addEventListener('touchend', e => {
    if (e.touches.length < 2) { pinchStart = null; if (!hintHidden) { hintHidden = true; document.getElementById('pinch-hint').classList.add('hidden'); } }
  }, { passive: true });
}

function pinchDist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }

function applyZoom(level) {
  level = Math.min(maxZoom, Math.max(minZoom, level));
  zoomLevel = level;
  if (useNativeZoom && videoTrack) {
    try { videoTrack.applyConstraints({ advanced: [{ zoom: level }] }); } catch(e) {}
  } else { elVideo.style.transform = `scale(${level})`; }
  elZoomBadge.textContent = level.toFixed(1) + '×';
  elZoomBadge.classList.add('show');
  clearTimeout(zoomBadgeTimer);
  zoomBadgeTimer = setTimeout(() => elZoomBadge.classList.remove('show'), 1800);
}

function setIntervalSecs(secs, btn) {
  intervalSecs = secs;
  document.querySelectorAll('.ivl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  stopCountdown(); startCountdown();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('paused', paused);
  if (paused) {
    stopCountdown(); setDot(''); setStatus('Paused — tap Resume to restart');
    elCdNum.textContent = '—'; elCdRing.style.strokeDasharray = `0 ${CIRC}`;
  } else { startCountdown(); }
}

function startCountdown() {
  if (paused) return;
  secondsLeft = intervalSecs;
  updateRing(); setDot('ready'); setStatus('Next capture in ' + secondsLeft + 's');
  countdownTimer = setInterval(() => {
    secondsLeft = Math.max(0, secondsLeft - 1);
    updateRing();
    if (secondsLeft > 0) setStatus('Next capture in ' + secondsLeft + 's');
    if (secondsLeft === 0) { stopCountdown(); runCapture(); }
  }, 1000);
}

function stopCountdown() { clearInterval(countdownTimer); countdownTimer = null; }

function updateRing() {
  const pct = intervalSecs > 0 ? secondsLeft / intervalSecs : 0;
  elCdRing.style.strokeDasharray = `${pct * CIRC} ${CIRC}`;
  elCdRing.classList.toggle('urgent', secondsLeft <= 10 && secondsLeft > 0);
  elCdNum.textContent = secondsLeft > 0 ? secondsLeft : '…';
}

async function runCapture() {
  if (busy) { startCountdown(); return; }
  const canvas = snapCanvas();
  if (!canvas) { setStatus('Camera not ready — retrying'); startCountdown(); return; }
  await fireClaudeCall(canvas);
  startCountdown();
}

async function manualCapture() {
  if (busy) return;
  stopCountdown();
  const canvas = snapCanvas();
  if (!canvas) { showToast('Camera not ready yet'); startCountdown(); return; }
  await fireClaudeCall(canvas);
  startCountdown();
}

function snapCanvas() {
  if (!elVideo.videoWidth || !elVideo.videoHeight) return null;
  elCanvas.width = elVideo.videoWidth;
  elCanvas.height = elVideo.videoHeight;
  elCanvas.getContext('2d').drawImage(elVideo, 0, 0);
  return elCanvas;
}

async function fireClaudeCall(canvas) {
  busy = true;
  elShutter.classList.add('busy'); elShutter.disabled = true;
  elFinderBox.classList.add('scanning'); elScanLine.classList.add('scanning');
  elSentBadge.classList.remove('show');
  setDot('busy'); setStatus('Reading question…');

  try {
    const base64 = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];

    const prompt = `Analyze this question image carefully and identify the correct answer(s).

First determine the question type:
- "single_mc": One correct answer from labeled choices (A, B, C, D, etc.)
- "multi_select": Multiple correct answers required (says "Choose 2", "Choose 3", "Select all that apply", etc.)
- "ordering": Items must be placed in correct sequence or order
- "matching": Terms must be matched to definitions or descriptions

Return a JSON object with exactly these fields:
- "type": the question type string
- "question": the main question text verbatim
- "answer": the correct answer(s) formatted by type (see below)
- "display": a concise human-readable answer string

Format by type:

single_mc — answer: correct letter string e.g. "B"
  display: same letter e.g. "B"

multi_select — answer: array of correct letters e.g. ["B","D"]
  display: letters joined with " & " e.g. "B & D"

ordering — answer: array of {position, text} objects in correct order
  display: numbered lines joined with newline e.g. "1 - Gather information\n2 - Prepare financial statements\n3 - Analyze financial statements\n4 - Make decision\n5 - Implement decision"

matching — answer: array of {term, match} objects for each pair
  display: lines joined with newline e.g. "Relevant - Information having to do with the matter at hand\nConservatism - Information related to recognizing losses as they occur"

Raw JSON only — no markdown, no code fences, no explanation.`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-6', max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
          { type: 'text', text: prompt }
        ]}]
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(`Claude API ${res.status}: ${e?.error?.message || res.statusText}`);
    }

    const data = await res.json();
    const raw  = data.content?.[0]?.text?.trim();

    let parsed;
    try { parsed = JSON.parse(raw); }
    catch { const m = raw.match(/\{[\s\S]*\}/); if (!m) throw new Error('Unparseable: ' + raw.slice(0, 80)); parsed = JSON.parse(m[0]); }

    const { type, question = '', display = '', answer } = parsed;
    if (!type || !display) throw new Error('Missing type or display in response');

    const typeLabels = { single_mc: 'Multiple Choice', multi_select: 'Multi-Select', ordering: 'Ordering', matching: 'Matching' };
    const firstLine  = display.split('\n')[0];
    elResultType.textContent     = typeLabels[type] || type;
    elResultAnswer.textContent   = firstLine.length > 6 ? '✓' : firstLine;
    elResultQuestion.textContent = question || '(no question text)';
    setStatus(`Sending ${typeLabels[type] || type} answer…`);

    await publishAnswer({ type, question, display, answer, ts: Date.now() });

    elSentBadge.classList.add('show');
    setDot('ready');
    setStatus(`Sent ✓ · ${typeLabels[type] || type} · Restarting timer`);

  } catch (err) {
    showToast(err.message);
    setDot('error'); setStatus('Error — see toast · Retrying next interval');
  }

  elFinderBox.classList.remove('scanning'); elScanLine.classList.remove('scanning');
  elShutter.classList.remove('busy'); elShutter.disabled = false;
  busy = false;
}

async function publishAnswer(payload) {
  const r = await fetch(FIREBASE_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error(`Firebase write failed (${r.status})`);
}

function setDot(s)    { elStatusDot.className = 'status-dot' + (s ? ' ' + s : ''); }
function setStatus(t) { elStatusText.textContent = t; }
function showToast(m) {
  elToast.textContent = m; elToast.classList.add('show');
  setTimeout(() => elToast.classList.remove('show'), 5000);
}

const saved = localStorage.getItem('claudeKey');
if (saved) document.getElementById('claude-key').value = saved;
</script>
</body>
</html>
